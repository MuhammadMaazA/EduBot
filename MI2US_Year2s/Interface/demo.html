<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduBot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7f8fa;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e1e4e8;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; color: #24292f; }
    header h1 em { color: #0969da; font-style: normal; }

    .pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: #57606a;
      background: #f6f8fa; border: 1px solid #d0d7de;
      border-radius: 20px; padding: 4px 10px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.on  { background: #2da44e; }
    .dot.off { background: #cf222e; }
    .dot.wait{ background: #bf8700; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; }
    .msg.user  { align-items: flex-end; }
    .msg.robot { align-items: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user  .bubble { background: #0969da; color: #fff; border-bottom-right-radius: 4px; }
    .msg.robot .bubble { background: #fff; color: #24292f; border: 1px solid #d0d7de; border-bottom-left-radius: 4px; }
    .msg.system .bubble {
      background: transparent; border: none;
      color: #57606a; font-size: 0.8rem;
      font-style: italic; align-self: center;
    }

    .label { font-size: 0.72rem; color: #57606a; padding: 0 4px; }

    .typing span {
      display: inline-block; width: 7px; height: 7px;
      background: #adb5bd; border-radius: 50%; margin: 0 2px;
      animation: bob 1.1s infinite;
    }
    .typing span:nth-child(2){ animation-delay:.2s }
    .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes bob { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    footer {
      background: #fff;
      border-top: 1px solid #e1e4e8;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      overflow-y: auto;
      background: #f6f8fa;
    }
    #msg-input:focus { border-color: #0969da; background: #fff; }

    #send-btn {
      padding: 10px 20px;
      background: #0969da;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #send-btn:disabled, #msg-input:disabled {
      opacity: 0.4; cursor: not-allowed;
    }
    #send-btn:hover:not(:disabled) { background: #0550ae; }

    #reset-btn {
      padding: 10px 14px;
      background: #f6f8fa;
      color: #57606a;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #reset-btn:hover:not(:disabled) { background: #eaeef2; }
    #reset-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>Edu<em>Bot</em></h1>
  <div class="pill">
    <div class="dot wait" id="dot"></div>
    <span id="status">Connecting…</span>
  </div>
</header>

<div id="chat">
  <div class="msg system"><div class="bubble">Ask me anything — I will guide you step by step.</div></div>
</div>

<footer>
  <textarea id="msg-input" rows="1" placeholder="Type your question…" disabled></textarea>
  <button id="reset-btn" disabled>New Chat</button>
  <button id="send-btn"  disabled>Send</button>
</footer>

<script>
  const WS = 'ws://' + window.location.hostname + ':10000';

  const chat     = document.getElementById('chat');
  const input    = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');
  const resetBtn = document.getElementById('reset-btn');
  const dot      = document.getElementById('dot');
  const status   = document.getElementById('status');

  let ws = null, typing = null;

  function connect() {
    ws = new WebSocket(WS);
    ws.onopen  = () => { setStatus('on','Connected'); enable(true); };
    ws.onclose = () => { setStatus('off','Disconnected'); enable(false); setTimeout(connect,3000); };
    ws.onerror = () => setStatus('off','Error');
    ws.onmessage = e => {
      const m = JSON.parse(e.data);
      if (m.type === 'thinking') {
        // Another client is ahead in the queue — keep spinner, update label
        removeTyping();
        showTyping('Queued — waiting for GPU...');
        return;
      }
      removeTyping();
      if (m.type === 'answer') {
        addMsg('robot', m.text, m.hint_stage, m.turn);
      }
      if (m.type === 'reset_ok')  addSys('Conversation cleared.');
      enable(true);
    };
  }

  function setStatus(cls, txt) {
    dot.className = 'dot ' + cls;
    status.textContent = txt;
  }

  function enable(v) {
    input.disabled   = !v;
    sendBtn.disabled  = !v;
    resetBtn.disabled = !v;
    if (v) input.focus();
  }

  const STAGE_BADGE = {
    socratic: null,
    escalate: { text: 'Bigger hint',  color: '#f59e0b' },
    reveal:   { text: 'Full answer',  color: '#10b981' },
  };

  function addMsg(who, text, hintStage, turn) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + who;
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = who === 'user' ? 'You' : 'Robot';
    // hint-stage badge for robot messages
    if (who === 'robot' && hintStage && STAGE_BADGE[hintStage]) {
      const badge = document.createElement('span');
      const { text: bt, color } = STAGE_BADGE[hintStage];
      badge.textContent = bt;
      badge.style.cssText = `margin-left:6px;font-size:.7em;padding:1px 6px;
        border-radius:8px;background:${color};color:#fff;vertical-align:middle;`;
      lbl.appendChild(badge);
    }
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    wrap.appendChild(lbl);
    wrap.appendChild(b);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function addSys(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg system';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    wrap.appendChild(b);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping(label) {
    const wrap = document.createElement('div');
    wrap.className = 'msg robot';
    const b = document.createElement('div');
    b.className = 'bubble typing';
    b.innerHTML = label
      ? `<em style="opacity:.7;font-size:.85em">${label}</em>`
      : '<span></span><span></span><span></span>';
    wrap.appendChild(b);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    typing = wrap;
  }

  function removeTyping() { if (typing) { typing.remove(); typing = null; } }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    addMsg('user', text);
    input.value = '';
    input.style.height = 'auto';
    enable(false);
    showTyping();
    ws.send(JSON.stringify({ type: 'question', text }));
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  resetBtn.addEventListener('click', () => {
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'reset' }));
    while (chat.children.length > 1) chat.removeChild(chat.lastChild);
  });

  connect();
</script>
</body>
</html>
